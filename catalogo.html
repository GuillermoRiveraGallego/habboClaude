<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habbo Solo — Catálogo completo (prueba visual)</title>
<link rel="stylesheet" href="css/estilo.css">
</head>
<body class="prueba">

<header class="cabecera">
  <h1>Catálogo completo</h1>
  <p>Página de prueba visual de todos los furnis · <a href="index.html">volver al juego</a></p>
</header>

<section class="panel-prueba">
  <h2>Paleta cerrada (20 colores × 3 variantes: superior / lateral / frontal)</h2>
  <div id="paleta" class="paleta"></div>
</section>

<div id="secciones"></div>

<script src="js/paleta.js"></script>
<script src="js/iso.js"></script>
<script src="js/furnis.js"></script>
<script>
(function () {
  // --- Paleta ---
  var contPaleta = document.getElementById("paleta");
  Paleta.nombres.forEach(function (nombre) {
    var c = Paleta.get(nombre);
    var div = document.createElement("div");
    div.className = "muestra-color";
    div.innerHTML =
      '<div class="tonos">' +
        '<span style="background:' + c.sup + '"></span>' +
        '<span style="background:' + c.izq + '"></span>' +
        '<span style="background:' + c.der + '"></span>' +
      '</div>' + nombre;
    contPaleta.appendChild(div);
  });

  // --- Furnis por categoría ---
  var cont = document.getElementById("secciones");
  var total = 0;
  Furnis.categorias().forEach(function (cat) {
    var furnis = Furnis.lista().filter(function (f) { return f.categoria === cat[0]; });
    if (!furnis.length) return;
    var seccion = document.createElement("section");
    seccion.className = "panel-prueba";
    var h = document.createElement("h2");
    h.textContent = cat[1] + " (" + furnis.length + ")";
    seccion.appendChild(h);
    var rejilla = document.createElement("div");
    rejilla.className = "rejilla";
    furnis.forEach(function (f) {
      total++;
      var carta = document.createElement("div");
      carta.className = "carta";
      var canvas = document.createElement("canvas");
      canvas.width = 180;
      canvas.height = 160;
      carta.appendChild(canvas);
      var info = document.createElement("div");
      info.innerHTML =
        '<div class="nombre">' + f.nombre + '</div>' +
        '<div class="detalle">' + f.tam[0] + '×' + f.tam[1] +
        (f.rotaciones > 1 ? ' · ' + f.rotaciones + ' giros' : '') +
        (f.sentable ? ' · ' + f.sentable : '') +
        (f.raro ? ' · <span class="precio">RARO</span>' : '') +
        ' · <span class="precio">' + f.precio + ' cr</span></div>';
      carta.appendChild(info);
      rejilla.appendChild(carta);
      Furnis.miniatura(canvas, f.id);
    });
    seccion.appendChild(rejilla);
    cont.appendChild(seccion);
  });

  document.querySelector(".cabecera p").innerHTML =
    total + " furnis en total · <a href='index.html'>volver al juego</a>";
})();
</script>
</body>
</html>
