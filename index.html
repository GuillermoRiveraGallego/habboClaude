<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GuilleHC</title>
<link rel="icon" href="img/face-raspberry-svgrepo-com.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/estilo.css">
</head>
<body class="juego">

<div id="app">
  <div id="zona-canvas">
    <canvas id="lienzo"></canvas>

    <div id="menu-furni" class="oculto">
      <button id="btn-rotar">⟳ Rotar</button>
      <button id="btn-mover">✥ Mover</button>
      <button id="btn-guardar">📦 Guardar</button>
      <button id="btn-vender">💰</button>
    </div>

    <div id="pista-fantasma" class="oculto">
      Click: colocar · <b>R</b>: rotar · <b>Esc</b> o click derecho: cancelar
    </div>

    <div id="panel-mascota" class="oculto">
      <div id="pm-cabecera">
        <span id="pm-titulo"></span>
        <button id="pm-cerrar">✕</button>
      </div>
      <div id="pm-barras"></div>
      <div id="pm-acciones">
        <button id="pm-alimentar" class="mini">🍖 Alimentar</button>
        <button id="pm-jugar" class="mini">🎾 Jugar</button>
      </div>
    </div>

    <div id="panel-chat" class="oculto">
      <div id="chat-cabecera">
        <span id="chat-titulo"></span>
        <button id="chat-cerrar">✕</button>
      </div>
      <div id="chat-mensajes"></div>
      <div id="chat-envio">
        <input id="chat-input" type="text" maxlength="80"
               placeholder="Escribe algo…" autocomplete="off">
        <button id="chat-enviar">➤</button>
      </div>
    </div>

    <div id="avisos"></div>
  </div>

  <div id="hud">
    <div id="hud-marca">Habbo Solo</div>
    <div id="hud-cartera">💰 <span id="hud-creditos">0</span></div>
    <div id="hud-sala-caja">🏠 <span id="hud-sala"></span></div>
    <button id="btn-ambiente" title="Ciclo día/noche · pulsa para cambiar la fase"></button>
    <div id="hud-botones">
      <button id="btn-modo">🎨 <span class="etiqueta">Decorar</span></button>
      <button data-panel="catalogo">🛒 <span class="etiqueta">Catálogo</span></button>
      <button data-panel="inventario">📦 <span class="etiqueta">Inventario</span></button>
      <button data-panel="salas">🚪 <span class="etiqueta">Salas</span></button>
      <button data-panel="tareas">📋 <span class="etiqueta">Tareas</span></button>
      <button data-panel="mascotas">🐾 <span class="etiqueta">Mascotas</span></button>
      <button data-panel="avatar">👤 <span class="etiqueta">Avatar</span></button>
      <button id="btn-cuenta" title="Cuenta (jugando en local)">☁️ <span class="etiqueta" id="hud-cuenta-estado">Local</span></button>
    </div>
  </div>

  <aside id="panel" class="oculto">
    <header>
      <h2 id="panel-titulo"></h2>
      <button id="panel-cerrar">✕</button>
    </header>
    <nav id="panel-pestanas"></nav>
    <div id="panel-contenido"></div>
  </aside>
</div>

<script src="js/paleta.js"></script>
<script src="js/iso.js"></script>
<script src="js/furnis.js"></script>
<script src="js/avatar.js"></script>
<script src="js/juego.js"></script>
<script src="js/mascotas.js"></script>
<script src="js/npcs.js"></script>
<script src="js/tareas.js"></script>
<script src="js/sala.js"></script>
<script src="js/ui.js"></script>
<script src="js/minijuegos.js"></script>
<script src="js/casino.js"></script>
<script src="js/guardado.js"></script>
<script src="js/ambiente.js"></script>
<!-- Nube (Supabase): config local + librería vendorizada + servicio.
     Independientes de la cadena del juego; nada depende aún de ellos.
     Si config.js no existe o está vacío, el juego arranca igual. -->
<script src="config.js"></script>
<script src="js/vendor/supabase.js"></script>
<script src="js/services/supabase.js"></script>
<!-- UI de cuenta (T4.2): autónoma, se abre con Cuenta.abrir().
     Aún sin cablear al HUD ni al arranque. -->
<script src="js/cuenta.js"></script>
<script>
(function () {
  var prueba = new URLSearchParams(location.search).get("prueba");

  // En modo prueba se juega con partida limpia y SIN guardar,
  // para no tocar la partida real (salvo los modos e2e del
  // propio guardado).
  var guardada = (!prueba || prueba === "e2e2") ? Guardado.cargar() : null;
  Juego.iniciar(guardada);
  Avatar.ponAspecto(Juego.aspecto()); // el aspecto vive en el estado del juego

  var zona = document.getElementById("zona-canvas");
  function tamanoLienzo() {
    return {
      ancho: Math.max(280, Math.min(zona.clientWidth, 1400)),
      alto: Math.max(220, Math.min(zona.clientHeight, 900))
    };
  }
  var tam = tamanoLienzo();
  Sala.iniciar(document.getElementById("lienzo"), { ancho: tam.ancho, alto: tam.alto });
  Sala.cargar(Juego.salaActual());
  UI.iniciar();
  Minijuegos.iniciar();
  Casino.iniciar();
  Ambiente.iniciar();

  // Nube (Supabase): solo prepara la infraestructura (T2). No hace
  // login ni guarda nada todavía; si no hay config, queda deshabilitada.
  if (window.Nube) {
    Nube.inicializar();
    console.log("Nube:", Nube.estado().estado, "-", Nube.estado().motivo || "disponible");
  }

  // HUD de cuenta (T4.3): el botón abre el modal e indica el estado
  // (Local / email), refrescándose al iniciar o cerrar sesión. No se
  // monta en modo prueba (para no ensuciar tests ni capturas).
  (function () {
    var btn = document.getElementById("btn-cuenta");
    if (!btn) return;
    if (prueba) { btn.style.display = "none"; return; }
    var etiqueta = document.getElementById("hud-cuenta-estado");
    function refrescar(sesion) {
      var email = sesion && sesion.user && sesion.user.email;
      etiqueta.textContent = email || "Local";
      btn.title = email ? ("Cuenta: " + email) : "Cuenta (jugando en local)";
    }
    btn.addEventListener("click", function () {
      if (window.Cuenta) Cuenta.abrir();
    });
    if (window.Nube && Nube.disponible()) {
      // onAuthStateChange emite la sesión inicial y cada login/logout
      Nube.alCambiarSesion(function (sesion) { refrescar(sesion); });
    } else {
      // Supabase no configurado: se juega en local. El botón sigue
      // abriendo el modal, que explica cómo configurarlo.
      refrescar(null);
      btn.classList.add("sin-nube");
      btn.title = "Supabase no configurado — juegas en local";
    }
  })();

  // responsive: el panel lateral se ancla sobre el HUD (var CSS)
  // y el lienzo se adapta al redimensionar la ventana
  var hud = document.getElementById("hud");
  function ajustarAltoHud() {
    document.documentElement.style.setProperty("--alto-hud", hud.offsetHeight + "px");
  }
  ajustarAltoHud();
  var tempRedim = null;
  window.addEventListener("resize", function () {
    clearTimeout(tempRedim);
    tempRedim = setTimeout(function () {
      ajustarAltoHud();
      var t = tamanoLienzo();
      Sala.redimensionar(t.ancho, t.alto);
    }, 120);
  });

  if (!prueba) {
    Guardado.iniciar({
      alError: function () { UI.avisar("No se pudo guardar la partida", "error"); }
    });
    Guardado.guardar(); // primera foto de la partida
    if (guardada) UI.avisar("Partida cargada — bienvenido de nuevo", "ok");
  }

  // ---- modos de prueba para capturas: index.html?prueba=... ----
  if (prueba) document.getElementById("panel").style.transition = "none";
  if (prueba === "catalogo") {
    UI.abrirPanel("catalogo");
  } else if (prueba === "inventario") {
    Juego.aInventario({ uid: 90, id: "sofa_rojo" });
    Juego.aInventario({ uid: 91, id: "ficus" });
    UI.abrirPanel("inventario");
  } else if (prueba === "salas") {
    UI.abrirPanel("salas");
  } else if (prueba === "fantasma") {
    UI.abrirPanel("catalogo");
    UI.empezarColocacion("sofa_rojo", "catalogo");
    Sala.depurar.hover(4, 5);
  } else if (prueba === "fantasma_mal") {
    UI.abrirPanel("catalogo");
    UI.empezarColocacion("sofa_rojo", "catalogo");
    Sala.depurar.hover(1, 7); // encima de la cama: inválido
  } else if (prueba === "fantasma_pared") {
    UI.abrirPanel("catalogo");
    UI.empezarColocacion("cuadro_abstracto", "catalogo");
    Sala.depurar.hoverPared("y", 4);
  } else if (prueba === "seleccion") {
    UI.ponerModo("decorar");
    Sala.depurar.seleccionar(1); // la cama inicial
  } else if (prueba === "flujo") {
    // prueba automatizada del flujo de decoración y economía
    var log = [];
    function paso(nombre, ok) { log.push((ok ? "OK " : "FALLO ") + nombre); }

    var c0 = Juego.creditos();
    var inst = Juego.comprar("sofa_azul");
    paso("comprar sofá (-220)", !!inst && Juego.creditos() === c0 - 220);
    Juego.salaActual().furnis.push({ uid: inst.uid, id: inst.id, x: 7, y: 2, rot: 1 });

    paso("validar casilla libre", Sala.validar("mesa_madera", 4, 4, 0));
    paso("validar sobre cama = no", !Sala.validar("mesa_madera", 1, 7, 0));
    paso("validar sobre sofá nuevo = no", !Sala.validar("mesa_madera", 7, 2, 0));
    paso("validar fuera de sala = no", !Sala.validar("mesa_comedor", 9, 9, 0));
    paso("pared libre", Sala.validarPared("cuadro_abstracto", "x", 6));
    paso("pared ocupada = no", !Sala.validarPared("cuadro_abstracto", "x", 3));

    var c1 = Juego.creditos();
    var n = Juego.vender("planta_helecho");
    paso("vender planta +17", n === 17 && Juego.creditos() === c1 + 17);
    var fs = Juego.salaActual().furnis;
    fs.splice(fs.findIndex(function (f) { return f.uid === 3; }), 1);

    Juego.aInventario({ uid: 50, id: "ficus" });
    paso("inventario 1 objeto", Juego.inventario().length === 1);

    var c2 = Juego.creditos();
    var pudoAtico = Juego.desbloquearSala(2);
    paso("desbloquear ático coherente con créditos", pudoAtico === (c2 >= 1200));
    var c3 = Juego.creditos();
    paso("desbloquear estudio (-400)", Juego.desbloquearSala(1) && Juego.creditos() === c3 - 400);
    paso("cambiar a estudio", Juego.cambiarSala(1));
    Sala.cargar(Juego.salaActual());
    Juego.cambiarColor("suelo", "verde");
    Juego.cambiarColor("pared", "rosa");
    paso("colores cambiados", Juego.salaActual().colorSuelo === "verde" &&
      Juego.salaActual().colorPared === "rosa");

    var div = document.createElement("div");
    div.style.cssText = "position:absolute;top:10px;left:10px;background:rgba(43,47,58,0.95);" +
      "border:2px solid #565f75;border-radius:10px;padding:10px 14px;font-size:13px;" +
      "white-space:pre;z-index:20;line-height:1.5";
    div.textContent = log.join("\n");
    document.getElementById("zona-canvas").appendChild(div);
  }

  // ---- pruebas del jardín y las mascotas ----

  function montarJardin() {
    Juego.ganar(3000);
    Juego.desbloquearSala(3);
    var j = Juego.salas()[3];
    j.furnis.push({ uid: 60, id: "acuario", x: 6, y: 7, rot: 0 });
    j.furnis.push({ uid: 61, id: "aviario", x: 8, y: 1, rot: 0 });
    j.furnis.push({ uid: 62, id: "banco_madera", x: 0, y: 4, rot: 0 });
    j.furnis.push({ uid: 63, id: "ficus", x: 9, y: 9, rot: 0 });
    Juego.cambiarSala(3);
    Sala.cargar(Juego.salaActual());
    var perro = Juego.nuevaMascota("perro", "Toby", null);
    var gato = Juego.nuevaMascota("gato", "Michi", null);
    Juego.nuevaMascota("pez", "Nemo", 60);
    Juego.nuevaMascota("pez", "Perla", 60);
    Juego.nuevaMascota("pajaro", "Kiwi", 61);
    Juego.agregarComida("perro");
    Juego.agregarComida("gato");
    return { perro: perro, gato: gato };
  }

  if (prueba === "jardin") {
    montarJardin();
  } else if (prueba === "jardin_triste") {
    var ms = montarJardin();
    Juego.mascotas().forEach(function (m) { m.felicidad = 15; m.hambre = 10; });
    ms.perro.felicidad = 95; // uno contento para comparar
  } else if (prueba === "mascota") {
    var ms2 = montarJardin();
    setTimeout(function () {
      var rt = Mascotas.runtimeDe(ms2.perro.uid);
      UI.abrirPanelMascota(ms2.perro, rt ? Sala.puntoPantalla(rt.x, rt.y, 0.9) : { x: 400, y: 300 });
    }, 300);
  } else if (prueba === "tienda") {
    montarJardin();
    UI.abrirPanel("mascotas", "tienda");
  } else if (prueba === "panel_mascotas") {
    montarJardin();
    UI.abrirPanel("mascotas", "mias");
  } else if (prueba === "jardin_flujo") {
    var log2 = [];
    function paso2(nombre, ok) { log2.push((ok ? "OK " : "FALLO ") + nombre); }

    paso2("comprar perro sin jardín = no", !Mascotas.puedeComprar("perro").ok);
    Juego.ganar(3000);
    paso2("desbloquear jardín", Juego.desbloquearSala(3));
    paso2("perro comprable", Mascotas.puedeComprar("perro").ok);
    var rp = Mascotas.comprar("perro", "Toby");
    paso2("comprar perro", rp.ok && Juego.mascotas().length === 1);
    paso2("pez sin acuario = no", !Mascotas.puedeComprar("pez").ok);
    Juego.salas()[3].furnis.push({ uid: 60, id: "acuario", x: 6, y: 7, rot: 0 });
    paso2("pez con acuario ok", Mascotas.puedeComprar("pez").ok);
    var rz = Mascotas.comprar("pez", "Nemo");
    paso2("pez asignado al acuario", rz.ok && rz.mascota.hogarUid === 60);
    Mascotas.comprar("pez", "P2");
    Mascotas.comprar("pez", "P3");
    paso2("acuario lleno (3 peces) = no", !Mascotas.puedeComprar("pez").ok);

    var toby = rp.mascota;
    paso2("alimentar sin comida = no", !Mascotas.alimentar(toby).ok);
    Juego.agregarComida("perro");
    toby.hambre = 40;
    var ra = Mascotas.alimentar(toby);
    paso2("alimentar con comida (+45)", ra.ok && toby.hambre === 85 && Juego.comida().perro === 0);
    toby.energia = 50;
    toby.ultimoJuego = 0;
    paso2("jugar (-20 energía)", Mascotas.jugar(toby).ok && toby.energia === 30);
    paso2("jugar en cooldown = no", !Mascotas.jugar(toby).ok);
    toby.felicidad = 20;
    paso2("estado triste", Mascotas.estadoDe(toby) === "triste");
    toby.felicidad = 90;
    paso2("estado contento", Mascotas.estadoDe(toby) === "contento");

    Juego.mascotas().forEach(function (m) { m.felicidad = 95; });
    Mascotas.tick(0.016, null);
    paso2("fuente desbloqueada (4 mascotas ≥80%)", Juego.recompensas().fuente === true);
    paso2("gnomo aún no (hacen falta 5)", !Juego.recompensas().gnomo);
    Juego.nuevaMascota("pajaro", "Kiwi", null);
    Juego.mascotas().forEach(function (m) { m.felicidad = 95; });
    Mascotas.tick(0.016, null);
    paso2("gnomo desbloqueado con 5", Juego.recompensas().gnomo === true);

    Juego.cambiarSala(3);
    Sala.cargar(Juego.salaActual());

    var div2 = document.createElement("div");
    div2.style.cssText = "position:absolute;top:10px;left:10px;background:rgba(43,47,58,0.95);" +
      "border:2px solid #565f75;border-radius:10px;padding:10px 14px;font-size:13px;" +
      "white-space:pre;z-index:20;line-height:1.5";
    div2.textContent = log2.join("\n");
    document.getElementById("zona-canvas").appendChild(div2);
  }

  // ---- pruebas del ordenador y sus minijuegos ----

  if (prueba === "ordenador") {
    Minijuegos.abrir();
  } else if (prueba && prueba.indexOf("ordenador_") === 0 && prueba !== "ordenador_flujo") {
    Minijuegos.abrir();
    Minijuegos.depurar.jugar(prueba.slice("ordenador_".length));
  } else if (prueba === "ordenador_flujo") {
    var log3 = [];
    function paso3(nombre, ok) { log3.push((ok ? "OK " : "FALLO ") + nombre); }

    var salon = Juego.salas()[0];
    var pc = salon.furnis.filter(function (f) { return f.fijo; })[0];
    paso3("hay un ordenador fijo en el salón", !!pc && pc.id === "escritorio_ordenador");
    paso3("no se puede colocar nada encima", !Sala.validar("mesa_madera", 6, 0, 0));
    paso3("enfriamiento inicial a 0", Minijuegos.enfriamiento("sumas") === 0);
    Juego.empezarMinijuego("sumas");
    paso3("enfriamiento activo al empezar", Minijuegos.enfriamiento("sumas") > 0);
    var cA = Juego.creditos();
    var premio = Juego.terminarMinijuego("sumas", 8, 8);
    paso3("premio abonado (+8)", premio === 8 && Juego.creditos() === cA + 8);
    paso3("mejor puntuación registrada", Juego.datosMinijuego("sumas").mejor === 8);
    Juego.terminarMinijuego("sumas", 5, 5);
    paso3("mejor puntuación se conserva", Juego.datosMinijuego("sumas").mejor === 8);

    var div3 = document.createElement("div");
    div3.style.cssText = "position:absolute;top:10px;left:10px;background:rgba(43,47,58,0.95);" +
      "border:2px solid #565f75;border-radius:10px;padding:10px 14px;font-size:13px;" +
      "white-space:pre;z-index:20;line-height:1.5";
    div3.textContent = log3.join("\n");
    document.getElementById("zona-canvas").appendChild(div3);
  }

  // ---- pruebas de la personalización del avatar ----

  function aplicarLook(look) {
    Object.keys(look).forEach(function (k) { Juego.cambiarAspecto(k, look[k]); });
  }

  if (prueba === "avatar") {
    UI.abrirPanel("avatar");
  } else if (prueba === "avatar_look") {
    aplicarLook({ peinado: "melena", pelo: "amarillo", piel: "marron",
                  camiseta: "rojo", pantalon: "beige", zapatos: "blanco" });
    UI.abrirPanel("avatar");
    Sala.depurar.avatar({ x: 4.5, y: 4.5, dir: 1, pose: "parado" });
  } else if (prueba === "avatar_look2") {
    aplicarLook({ peinado: "tupe", pelo: "negro", piel: "crema",
                  camiseta: "morado", pantalon: "negro", zapatos: "rojo" });
    Sala.depurar.sentar(2); // sentado en la silla con el nuevo aspecto
  } else if (prueba === "avatar_flujo") {
    var log4 = [];
    function paso4(nombre, ok) { log4.push((ok ? "OK " : "FALLO ") + nombre); }

    paso4("aspecto inicial camiseta turquesa", Juego.aspecto().camiseta === "turquesa");
    Juego.cambiarAspecto("camiseta", "rojo");
    paso4("cambio de camiseta aplicado", Juego.aspecto().camiseta === "rojo");
    paso4("el cambio queda en el estado (guardable)", Juego.estado().avatar.camiseta === "rojo");
    Juego.cambiarAspecto("peinado", "melena");
    paso4("cambio de peinado aplicado", Juego.aspecto().peinado === "melena");
    var esMismo = (Juego.aspecto() === Juego.estado().avatar);
    paso4("Avatar dibuja desde el mismo objeto", esMismo);

    var div4 = document.createElement("div");
    div4.style.cssText = "position:absolute;top:10px;left:10px;background:rgba(43,47,58,0.95);" +
      "border:2px solid #565f75;border-radius:10px;padding:10px 14px;font-size:13px;" +
      "white-space:pre;z-index:20;line-height:1.5";
    div4.textContent = log4.join("\n");
    document.getElementById("zona-canvas").appendChild(div4);
  }

  // ---- pruebas del guardado ----

  function cajaTexto(texto) {
    var div = document.createElement("div");
    div.style.cssText = "position:absolute;top:10px;left:10px;background:rgba(43,47,58,0.95);" +
      "border:2px solid #565f75;border-radius:10px;padding:10px 14px;font-size:13px;" +
      "white-space:pre;z-index:20;line-height:1.5";
    div.textContent = texto;
    document.getElementById("zona-canvas").appendChild(div);
  }

  if (prueba === "guardado_flujo") {
    // respalda la partida real para no pisarla con la de prueba
    var respaldo = localStorage.getItem(Guardado.CLAVE);
    var log5 = [];
    function paso5(nombre, ok) { log5.push((ok ? "OK " : "FALLO ") + nombre); }

    Juego.cambiarAspecto("camiseta", "rojo");
    Juego.ganar(123);
    var cG = Juego.creditos();
    paso5("guardar", Guardado.guardar());
    var datos = Guardado.cargar();
    paso5("cargar devuelve datos", !!datos);
    paso5("créditos persistidos", datos && datos.creditos === cG);
    paso5("aspecto persistido", datos && datos.avatar.camiseta === "rojo");
    paso5("las 6 salas persistidas", datos && datos.salas.length === 6);

    // migración: partida "antigua" sin comida y sin ordenador fijo
    delete datos.comida;
    datos.salas[0].furnis = datos.salas[0].furnis.filter(function (f) { return !f.fijo; });
    localStorage.setItem(Guardado.CLAVE, JSON.stringify(datos));
    Juego.iniciar(Guardado.cargar());
    paso5("migración restaura la despensa", !!Juego.comida() && Juego.comida().perro === 0);
    paso5("migración restaura el ordenador fijo",
      Juego.salas()[0].furnis.some(function (f) { return f.fijo; }));

    // una versión desconocida se descarta
    localStorage.setItem(Guardado.CLAVE, JSON.stringify({ version: 99 }));
    paso5("versión desconocida se descarta", Guardado.cargar() === null);
    // una partida corrupta se descarta

    // NPCs de ambiente
    paso11("el casino tiene 3 NPCs de ambiente", Npcs.enSala(5).length === 3);
    var ctxNpc = {
      libre: function () { return false; },
      sentableEn: function (x, y) { return (x === 2 && y === 7) ? 0.68 : null; }
    };
    Npcs.tickCasino(3, ctxNpc);
    Npcs.tickCasino(3, ctxNpc);
    paso11("la clienta del bar se sienta", Npcs.estadoCasino("casimira") === "sentado");
    paso11("la crupier no pasea",
      ["jugando", "esperando"].indexOf(Npcs.estadoCasino("lucia")) !== -1);
    Npcs.tickCasino(10, ctxNpc);
    paso11("los NPC sueltan frases de ambiente", typeof Npcs.fraseCasino("rufino") === "string");
    var luciaC = Npcs.porId("lucia");
    paso11("los NPC del casino conversan",
      luciaC.genericas.indexOf(Npcs.responder(luciaC, "xyzzy")) !== -1);
    paso11("Lucía la crupier mide el doble", luciaC.alto === 2);
    paso11("trile: niveles endurecidos al doble",
      Casino.TRILE_NIVELES.tranquilo.cambios === 12 &&
      Casino.TRILE_NIVELES.normal.cambios === 18 &&
      Casino.TRILE_NIVELES.vertiginoso.cambios === 26);
    paso11("no se coloca un mueble sobre un NPC", !Sala.validar("sofa_cuero", 6, 6, 0));

    cajaTexto(log11.join("\n"));
  }

  // ---- pruebas de la UI de cuenta (Supabase Auth) ----
  // Nube se mockea para no tocar la red ni crear usuarios reales.

  if (prueba === "cuenta") {
    Nube.disponible = function () { return true; };
    Nube.usuario = function () { return Promise.resolve(null); };
    Cuenta.abrir();
  } else if (prueba === "cuenta_logueado") {
    Nube.disponible = function () { return true; };
    Nube.usuario = function () { return Promise.resolve({ email: "jugador@ejemplo.com" }); };
    Cuenta.abrir();
  } else if (prueba === "cuenta_flujo") {
    var log12 = [];
    function paso12(nombre, ok) { log12.push((ok ? "OK " : "FALLO ") + nombre); }
    function tick12() { return new Promise(function (res) { setTimeout(res, 30); }); }

    // Nube mockeada: sesión en memoria, sin red ni usuarios reales
    var sesionFake = null;
    Nube.disponible = function () { return true; };
    Nube.usuario = function () { return Promise.resolve(sesionFake ? sesionFake.user : null); };
    Nube.entrar = function (email) {
      sesionFake = { user: { email: email } };
      return Promise.resolve({ data: {}, error: null });
    };
    Nube.registrar = Nube.entrar;
    Nube.salir = function () { sesionFake = null; return Promise.resolve({ error: null }); };

    function contCuenta() { return document.getElementById("mc-contenido"); }

    Cuenta.abrir();
    tick12().then(function () {
      paso12("sin sesión: se muestra el formulario", !!document.getElementById("mc-form"));
      paso12("sin sesión: pestañas Entrar y Registrarse",
        document.querySelectorAll(".mc-tab").length === 2);
      document.getElementById("mc-email").value = "jugador@ejemplo.com";
      document.getElementById("mc-pass").value = "clave123";
      document.getElementById("mc-form").dispatchEvent(
        new Event("submit", { bubbles: true, cancelable: true }));
      return tick12();
    }).then(function () {
      paso12("tras entrar: estado logueado (botón cerrar sesión)",
        !!document.getElementById("mc-salir"));
      var b = contCuenta().querySelector(".mc-info b");
      paso12("tras entrar: muestra el email",
        !!b && b.textContent.indexOf("jugador@ejemplo.com") !== -1);
      document.getElementById("mc-salir").click();
      return tick12();
    }).then(function () {
      paso12("tras cerrar sesión: vuelve al formulario", !!document.getElementById("mc-form"));
      Nube.disponible = function () { return false; };
      Cuenta.render();
      return tick12();
    }).then(function () {
      paso12("sin nube: avisa de que no está configurado",
        contCuenta().textContent.indexOf("no está configurado") !== -1);
      cajaTexto(log12.join("\n"));
    });
  }
})();
</script>
</body>
</html>
